name: Deploy to cPanel (Theme & Plugins)

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Theme & Plugins
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/ # deploy thẳng vào public_html

          # Chỉ deploy nội dung bên trong app/public
          local-dir: app/public/

          exclude: |
            .git/
            .github/
            *.md
            .cpanel.yml
            .gitignore
            wp-content/uploads/**
